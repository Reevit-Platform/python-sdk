name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov pip-audit

      - name: Report dependency audit
        run: pip-audit || true

      - name: Validate tracked package files
        run: |
          python - <<'PY'
          import pathlib, subprocess, sys
          root = pathlib.Path('.')
          tracked = subprocess.check_output(['git', 'ls-files', '-z'], text=True).split('\0')
          errors = []
          for rel in filter(None, tracked):
              if rel.endswith('.gitkeep'):
                  continue
              path = root / rel
              if rel.endswith(('.new', '.tmp', '.bak', '.orig')):
                  errors.append(f"tracked temp file: {rel}")
              if path.is_file() and path.stat().st_size == 0:
                  errors.append(f"empty tracked file: {rel}")
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          PY

      - name: Run tests
        run: pytest --cov=reevit -v || echo "No tests found"

      - name: Verify package in a fresh virtualenv
        run: |
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          python -m pip install --upgrade pip
          pip install -e .
          python -c "import reevit; print('Package imports successfully')"
